name: "PR Comment"
description: "Create or update a PR comment"
author: "Gerard Sala"

inputs:
  token:
    description: "GitHub token with issues:write (usually secrets.GITHUB_TOKEN)"
    required: true
  body-file:
    description: "Path to a Markdown file with the comment body; treated as a template by default unless render-template is false"
    required: true
  render-template:
    description: "Treat body-file as a template and replace {{PLACEHOLDER}} tokens from TPL_ prefixed environment variables"
    required: false
    default: "true"
  pr-number:
    description: "Pull request number; auto-detected on PR events if omitted"
    required: false
  update-marker:
    description: "Stable marker token used to find/update the comment. Can be used to have multiple comments in the same PR."
    required: false
    default: "pr-comment:default"

outputs:
  comment-id:
    description: "ID of the created/updated comment"
    value: ${{ steps.upsert.outputs.comment_id }}
  comment-url:
    description: "URL of the created/updated comment"
    value: ${{ steps.upsert.outputs.comment_url }}

runs:
  using: "composite"
  steps:
    - name: Resolve PR number
      id: resolve
      shell: bash
      env:
        INPUT_PR: ${{ inputs['pr-number'] }}
      run: |
        PR="${INPUT_PR:-}"

        # If PR number is not provided, try to get it from the current branch name
        if [[ -z "$PR" ]]; then
          if [[ "${GITHUB_REF:-}" =~ refs/pull/([0-9]+)/ ]]; then
            PR="${BASH_REMATCH[1]}"
          fi
        fi

        # If PR number is still not provided, error out
        if [[ -z "$PR" ]]; then
          echo "::error::pr-number is required when not running in a PR context."
          exit 1
        fi
        echo "pr=$PR" >> "$GITHUB_OUTPUT"

    - name: Create or update comment
      id: upsert
      uses: actions/github-script@v9
      env:
        PR: ${{ steps.resolve.outputs.pr }}
        BODY_FILE: ${{ inputs['body-file'] }}
        RENDER_TEMPLATE: ${{ inputs['render-template'] }}
        RAW_MARKER: ${{ inputs['update-marker'] }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          const fs = require('fs')
          const pr = parseInt(process.env.PR, 10)
          if (!Number.isFinite(pr)) {
            core.setFailed('Invalid PR number')
            return
          }
          const bodyFile = process.env.BODY_FILE || ''
          if (!bodyFile || !fs.existsSync(bodyFile) || !fs.statSync(bodyFile).isFile()) {
            core.setFailed(`body-file does not exist: ${bodyFile || '<empty>'}`)
            return
          }
          const renderTemplate = /^true$/i.test(process.env.RENDER_TEMPLATE || 'false')
          const marker = `<!-- ${process.env.RAW_MARKER || ''} -->`
          let body = fs.readFileSync(bodyFile, 'utf8')
          if (renderTemplate) {
            const missingPlaceholders = new Set()
            body = body.replace(/\{\{\s*([A-Za-z_][A-Za-z0-9_]*)\s*\}\}/g, (match, placeholder) => {
              const envKey = `TPL_${placeholder}`
              if (Object.prototype.hasOwnProperty.call(process.env, envKey)) {
                return process.env[envKey] ?? ''
              }

              missingPlaceholders.add(placeholder)
              return match
            })

            for (const placeholder of missingPlaceholders) {
              core.warning(`No value provided for template placeholder ${placeholder}; leaving token unchanged.`)
            }
          }
          body = `${marker}\n${body}`

          const owner = context.repo.owner
          const repo = context.repo.repo
          let existingId
          if (marker) {
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pr, per_page: 100 }
            )
            const match = comments.find(c => typeof c.body === 'string' && c.body.includes(marker))
            if (match) existingId = match.id
          }
          let result
          if (existingId) {
            result = await github.rest.issues.updateComment({ owner, repo, comment_id: existingId, body })
          } else {
            result = await github.rest.issues.createComment({ owner, repo, issue_number: pr, body })
          }
          core.setOutput('comment_id', String(result.data.id))
          core.setOutput('comment_url', result.data.html_url)
